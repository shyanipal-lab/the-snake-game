<!DOCTYPE html>
<html>
<head>
  <title>NOKIA SNAKE</title>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="main-container">

  <!-- HEADER -->
  <h1 class="title">NOKIA SNAKE</h1>
  <hr class="divider">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="lives">
      ❤️ <span id="lifeCount">3</span>
    </div>
    <div class="score">
      Score: <span id="score">0</span>
    </div>
  </div>

  <!-- GAME AREA WRAPPER -->
  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <!-- GAME OVER OVERLAY -->
    <div id="gameOverOverlay" class="game-over hidden">
      <h2>GAME OVER</h2>
      <p id="gameOverText"></p>
      <button onclick="restartGame()">🔄</button>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button onclick="move('UP')" class="ctrl-btn">⬆</button>

    <div class="horizontal">
      <button onclick="move('LEFT')" class="ctrl-btn">⬅</button>
      <button onclick="move('DOWN')" class="ctrl-btn">⬇</button>
      <button onclick="move('RIGHT')" class="ctrl-btn">➡</button>
    </div>
  </div>

</div>

<script src="game.js" defer></script>

</body>
</html>
